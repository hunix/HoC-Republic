; ──────────────────────────────────────────────────────────────
; HoC Republic Companion — M5StickC Plus2 Edition
;
; A pocket-sized window into the Republic.
; Chat, voice input, Republic stats, and gateway monitoring.
;
; Flash:  pio run -t upload
; Serial: pio device monitor
; ──────────────────────────────────────────────────────────────

[env:m5stickc-plus2]
platform          = espressif32
board             = m5stickc_plus2
framework         = arduino
monitor_speed     = 115200
upload_speed      = 460800

; ── Build flags ──────────────────────────────────────────────
; CRITICAL: -DWEBSOCKETS_MAX_DATA_SIZE MUST be a -D flag (not -include)
; so it applies to the WebSockets LIBRARY compilation, not just our
; project source.  The library's default is 15KB for ESP32, but the
; gateway's hello-ok response contains ~790 method names (~29KB).
; When a frame exceeds the limit, the library silently disconnects
; (code 1009) before the application layer sees the data.
build_flags =
    -DHOC_VERSION=\"3.0.0\"
    -DBOARD_M5STICKC_PLUS2
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_MODE=0
    -DWEBSOCKETS_MAX_DATA_SIZE=65536
    -w

; ── Library dependencies ─────────────────────────────────────
; M5StickCPlus2 is officially DEPRECATED by M5Stack.
; Use M5Unified (peripherals/power/buttons) + M5GFX (display/canvas)
; directly — these are the recommended replacements.
lib_deps =
    m5stack/M5Unified     @ ^0.2.2
    m5stack/M5GFX         @ ^0.2.5
    links2004/WebSockets  @ ^2.4.1
    bblanchon/ArduinoJson @ ^7.0.4
    rweather/Crypto       @ ^0.4.0

; ── Ignore broken transitive dependencies ────────────────────
; DFRobot_GP8XXX is pulled by M5Unified but has a bug where
; analogWriteResolution() is called with 2 args (pin, bits)
; instead of 1 arg (bits) on the ESP32 Arduino core >=3.x.
; We don't use any GP8XXX DAC hardware, so it's safe to exclude.
lib_ignore =
    DFRobot_GP8XXX
